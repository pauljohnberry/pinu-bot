name: Feature request
description: Suggest a new emotion, API shape, theme, or runtime capability.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the desired behavior or API.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include examples, references, or product constraints.
